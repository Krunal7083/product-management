<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Product</title>

  <style>
    body {
      font-family: Arial;
      background: #f1f3f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 25px;
      width: 350px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      margin-top: 15px;
      text-align: left;
    }

    .result p {
      margin: 5px 0;
    }

    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>View Product</h2>

  <input type="number" id="prodId" placeholder="Enter Product ID">

  <button onclick="getProduct()">View</button>

  <div class="result" id="result"></div>

  <button onclick="goBack()" style="margin-top:10px; background:#6c757d;">
    ⬅ Go Back
  </button>
</div>

<script>
  function getProduct() {
    const id = document.getElementById("prodId").value;

    if (!id) {
      alert("Enter Product ID");
      return;
    }

    fetch(`http://localhost:9090/viewProduct/${id}`)
      .then(res => {
        if (!res.ok) throw new Error("Not found");
        return res.json();
      })
      .then(data => {
        document.getElementById("result").innerHTML = `
          <p><strong>ID:</strong> ${data.id}</p>
          <p><strong>Name:</strong> ${data.name}</p>
          <p><strong>Description:</strong> ${data.description}</p>
          <p><strong>Price:</strong> ₹${data.price}</p>
          <img src="${data.photoUrl}" alt="Product Image"/>
        `;
      })
      .catch(() => {
        document.getElementById("result").innerHTML =
          "<p style='color:red;'>❌ Product not found</p>";
      });
  }

  function goBack() {
    window.history.back();
  }
</script>

</body>
</html>
